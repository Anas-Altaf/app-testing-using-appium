name: Appium Tests CI

on:
  push:
    branches: [main,feat/tests]

  pull_request:
    branches: [main]

jobs:
  appium-tests:
    runs-on: ubuntu-latest   # or macos-latest (macOS has better emulator support)

    steps:
      # 1. Checkout code (includes your APK in drivers/)
      - uses: actions/checkout@v4

      # 2. Set up JDK (required for Android SDK)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Install Python dependencies
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Install Appium + UiAutomator2 driver
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install -g appium
          appium driver install uiautomator2

      # 6. Start Appium server in background
      - run: appium --relaxed-security &

      # 7. Boot emulator and run tests inside it
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -no-audio -no-snapshot
          script: |
            adb wait-for-device
            pytest tests/ --html=reports/report.html --self-contained-html

      # 8. Upload report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-report
          path: reports/report.html

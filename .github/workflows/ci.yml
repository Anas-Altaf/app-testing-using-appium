name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lint with flake8
      - name: Run flake8 linting
        run: |
          flake8 config/ pages/ tests/ utils/ --count --show-source --statistics

      # 5. Validate project structure
      - name: Validate project structure
        run: |
          echo "Checking required directories..."
          test -d drivers   && echo "✓ drivers/"   || echo "✗ drivers/ missing"
          test -d pages     && echo "✓ pages/"     || echo "✗ pages/ missing"
          test -d tests     && echo "✓ tests/"     || echo "✗ tests/ missing"
          test -d utils     && echo "✓ utils/"     || echo "✗ utils/ missing"
          test -d config    && echo "✓ config/"    || echo "✗ config/ missing"
          echo "Checking key files..."
          test -f pages/base_page.py  && echo "✓ base_page.py"  || echo "✗ base_page.py missing"
          test -f tests/conftest.py   && echo "✓ conftest.py"   || echo "✗ conftest.py missing"

      # 6. Collect / validate tests (no device required)
      - name: Collect tests (dry run)
        run: |
          pytest --collect-only -q

      # 7. Generate HTML report (collect-only mode for CI without emulator)
      - name: Generate test report
        run: |
          pytest --collect-only --html=reports/report.html --self-contained-html || true

      # 8. Upload report artifact
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/report.html
          if-no-files-found: warn

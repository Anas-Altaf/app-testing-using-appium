name: Appium Tests CI

on:
  push:
    branches: [main, feat/tests]
  pull_request:
    branches: [main]

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout code (includes your APK via Git LFS)
      - uses: actions/checkout@v4
        with:
          lfs: true

      # 1b. Verify APK exists
      - name: Verify APK file
        run: |
          echo "Checking for APK at drivers/app.apk..."
          ls -lh drivers/app.apk
          file drivers/app.apk

      # 2. Enable KVM — required for fast x86 emulator on Linux runners
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 3. Set up JDK (required for Android SDK)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 5. Install Python dependencies
      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 6. Install Appium + UiAutomator2 driver
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install -g appium
          appium driver install uiautomator2

      # 7. Start Appium server in background and wait for it
      - name: Start Appium server
        run: |
          appium --relaxed-security &
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://127.0.0.1:4723/status

      # 8. Boot emulator and run tests
      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-snapshot -no-boot-anim
          emulator-boot-timeout: 300
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
            adb devices
            pytest tests/ --html=reports/report.html --self-contained-html -v

      # 9. Upload report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-test-report
          path: reports/report.html
